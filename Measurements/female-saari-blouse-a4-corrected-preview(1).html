<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Saari Blouse Measurement - A4</title>
<style>
  :root{--ink:#172554;--muted:#64748b;--line:#93a4bf;--soft:#f8fafc;--gold:#b08d57;--brand:#0f172a;}
  *{box-sizing:border-box}
  body{margin:0;background:#e5e7eb;font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Arial,sans-serif;color:var(--brand)}
  .page{width:210mm;height:297mm;margin:8px auto;background:#fff;padding:6mm;border:1px solid #cbd5e1;box-shadow:0 10px 30px rgba(15,23,42,.15);position:relative;overflow:hidden}
  @page{size:A4;margin:0}
  @media print{body{background:#fff}.page{margin:0;border:0;box-shadow:none;width:210mm;height:297mm}}
  .watermark{position:absolute;top:28mm;left:10mm;right:10mm;text-align:center;font-family:Georgia,serif;font-size:37px;letter-spacing:5px;color:#0f172a10;font-weight:700;pointer-events:none}
  header{border:2px solid var(--ink);display:grid;grid-template-columns:36mm 1fr;min-height:30mm;position:relative;background:linear-gradient(180deg,#fff,#f8fafc)}
  .logo{border-right:2px solid var(--ink);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--ink);font-size:28px}
  .logo span{border:2px solid var(--ink);border-radius:50%;width:50px;height:50px;display:flex;align-items:center;justify-content:center}
  .title{padding:4mm 5mm 3mm;text-align:center}
  .title h1{margin:0;font-size:20px;letter-spacing:.5px;color:var(--ink);font-weight:800;text-transform:uppercase}
  .title h2{margin:1mm 0 0;font-family:Georgia,serif;font-size:30px;letter-spacing:3px;color:#0f172a99}
  .meta{display:grid;grid-template-columns:1fr 1.2fr 1fr;border:2px solid var(--ink);border-top:0;height:12mm;font-size:11px;font-weight:600;color:var(--ink)}
  .meta div{padding:3mm;border-right:1.5px solid var(--ink)}.meta div:last-child{border-right:0}.blank{display:inline-block;min-width:35mm;border-bottom:1px solid #94a3b8;height:4mm}
  .grid{display:grid;grid-template-columns:1fr 62mm;gap:4mm;margin-top:3mm}
  .card{border:2px solid var(--ink);background:#fff;border-radius:3px;overflow:hidden;margin-bottom:5mm}
  .card h3{margin:0;background:#f1f5f9;color:var(--ink);font-size:15px;letter-spacing:.8px;text-transform:uppercase;padding:3.5mm 4mm;border-bottom:2px solid var(--ink)}
  .rows{display:grid}.row{display:grid;grid-template-columns:35mm 1fr;min-height:19mm;border-bottom:1.5px solid var(--line)}.row:last-child{border-bottom:0}.label{padding:3.2mm 3mm;font-weight:700;color:var(--ink);border-right:1.5px solid var(--line);font-size:15px;background:#fbfdff}.entry{padding:2mm 3mm;display:flex;align-items:center;gap:3mm;flex-wrap:wrap}.inputline{height:10mm;border-bottom:1.5px solid #64748b;flex:1;min-width:32mm}.mini{display:inline-flex;align-items:center;gap:1.5mm;margin-right:2mm;font-size:11px;color:#334155}.box{width:5mm;height:5mm;border:1.6px solid var(--ink);display:inline-block;border-radius:1px}.pill{display:inline-flex;align-items:center;gap:2mm;border:1px solid #cbd5e1;border-radius:999px;padding:1.5mm 2.6mm;font-size:10.5px;background:#f8fafc;color:#334155}.subgrid{display:grid;grid-template-columns:repeat(5,1fr);width:100%;gap:2mm}.subitem{border:1px solid #cbd5e1;background:#f8fafc;border-radius:2px;min-height:15mm;padding:2mm;font-size:12.5px;text-align:center;color:var(--ink);font-weight:650}.subitem .smallline{display:block;height:5mm;border-bottom:1px solid #64748b;margin-top:2mm}.style2{display:grid;grid-template-columns:1fr 1fr;gap:3mm;width:100%}.pocketgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:3mm;width:100%}.note{font-size:10px;color:var(--muted);line-height:1.35;margin-top:1mm}.side .card{margin-bottom:4mm}.side .row{grid-template-columns:1fr;min-height:12mm}.side .label{border-right:0;border-bottom:1px solid #e2e8f0;padding:2mm 3mm}.side .entry{min-height:8mm}.charges{border:1.8px dashed var(--gold);background:#fffbeb;padding:3mm;margin-bottom:4mm;font-size:11px;line-height:1.35;color:#713f12;border-radius:3px}.footer{position:absolute;left:12mm;right:12mm;bottom:8mm;border-top:1px solid #cbd5e1;padding-top:3mm;display:flex;justify-content:space-between;font-size:9.5px;color:#64748b}.printbtn{position:fixed;right:20px;top:20px;padding:10px 14px;border:0;border-radius:8px;background:#0f172a;color:#fff;font-weight:700;box-shadow:0 8px 20px rgba(0,0,0,.2);cursor:pointer}@media print{.printbtn{display:none}}

  .logo img{max-width:31mm;max-height:29mm;object-fit:contain;display:block}
  .bottom-toggle{display:grid;grid-template-columns:1fr 1fr;gap:3mm;padding:3mm;border-bottom:1.5px solid var(--line);background:#fff}
  .bottom-btn{border:2px solid var(--ink);background:#f8fafc;color:var(--ink);font-weight:800;text-transform:uppercase;letter-spacing:.4px;border-radius:4px;padding:3mm 2mm;cursor:pointer;font-size:11px}
  .bottom-btn.active{background:var(--ink);color:#fff}
  .bottom-panel{display:none}
  .bottom-panel.active{display:block}


  .side-choice{border:2px solid var(--ink);background:#fff;color:var(--ink);font-weight:800;border-radius:4px;padding:2.6mm 3.5mm;cursor:pointer;font-size:14px;margin-right:2mm}
  .side-choice.active{background:var(--ink);color:#fff}


  .side-bottom-toggle{grid-template-columns:1fr;gap:2.5mm}
  .side-bottom-toggle .bottom-btn{font-size:14px;padding:2.8mm 2mm}
  .side .card h3{font-size:14px}
  .side .row{grid-template-columns:1fr;min-height:13mm}
  .side .label{font-size:14px;font-weight:800}
  .side .entry{font-size:14px;min-height:8mm}


  .page{display:block}
  .side .card{height:auto}
  .side .bottom-panel .row{min-height:18mm}
  .side .bottom-panel .label{font-size:14.5px;padding:3mm}
  .side .bottom-panel .entry{min-height:10mm;padding:2.5mm 3mm}
  .side .bottom-toggle{padding:3.5mm}
  .side .bottom-btn{font-size:14.5px}


  .double-single{
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    justify-content:center;
    gap:2.2mm;
    text-align:left;
    padding-left:3mm;
  }
  .double-single .mini{
    display:flex;
    align-items:center;
    gap:2mm;
    margin:0;
    font-size:12.5px;
    line-height:1;
  }
  .subgrid{align-items:stretch}
  .subitem{display:flex;flex-direction:column;justify-content:center}
  .card{margin-bottom:3mm}
  .rows{height:auto}
  .side .bottom-panel .row{min-height:23mm}
  .side .bottom-panel .label{font-size:15px}
  .side .bottom-panel .entry{min-height:12mm}
  .side .bottom-btn{font-size:15px;padding:3.2mm 2mm}
  .footer{bottom:5mm}


  .side .pocketgrid{
    display:grid;
    grid-template-columns:1fr;
    gap:1.5mm;
    width:100%;
  }
  .side .pocketgrid .pill{
    justify-content:flex-start;
    font-size:13px;
    padding:1.8mm 2mm;
  }


  section > .card:last-child .row{min-height:18mm}


  .prince-sleeve-grid{grid-template-columns:1fr 1fr}
  .prince-neck-grid{grid-template-columns:1fr 1fr}
  .prince-sleeve-grid .subitem,
  .prince-neck-grid .subitem{min-height:17mm}
  .side .row{min-height:36mm}
  .side .label{font-size:15px}
  .side .entry{min-height:14mm}


  .saari-sleeve-grid{grid-template-columns:1fr 1fr}
  .saari-sleeve-grid .subitem{min-height:17mm}
  .side .row{min-height:55mm}
  .side .label{font-size:15px}
  .side .entry{min-height:18mm}

</style>
</head>
